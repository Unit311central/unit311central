    <text class="item" x="20" y="72">" File Explorer</text>
    <text class="item" x="20" y="94">" Email &amp; calendars</text>
    <text class="item" x="20" y="116">" Messaging, voice &amp; video</text>
    <text class="item" x="20" y="138">" Social media</text>
