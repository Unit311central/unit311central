    <text class="tag" x="16" y="44">Cash flow under control</text>
    <text class="item" x="20" y="72">" Finance dashboard</text>
    <text class="item" x="20" y="94">" Debtors &amp; creditors</text>
    <text class="item" x="20" y="116">" Expense tracking</text>
    <text class="item" x="20" y="138">" Accountancy integration</text>
  </g>
  <g transform="translate(885,210)">
    <rect class="card" width="255" height="230" rx="12"/>
    <rect class="accent" x="0" y="0" width="5" height="44" rx="2"/>
