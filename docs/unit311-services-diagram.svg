  <text class="flow-text" x="240" y="812" text-anchor="middle">Launch</text>
  <text class="flow-text" x="440" y="812" text-anchor="middle">Run</text>
  <text class="flow-text" x="640" y="812" text-anchor="middle">Operate</text>
  <text class="flow-text" x="840" y="812" text-anchor="middle">Scale</text>
