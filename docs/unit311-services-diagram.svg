    <text class="tag" x="16" y="44">From capture to deliverable</text>
    <text class="item" x="20" y="72">" WebODM processing</text>
    <text class="item" x="20" y="94">" Orthophoto &amp; DSM viewers</text>
    <text class="item" x="20" y="116">" Live telemetry</text>
    <text class="item" x="20" y="138">" Flight simulator testing</text>
  </g>
  <g transform="translate(885,470)">
