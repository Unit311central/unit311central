    <text class="tag" x="16" y="44">Assets you can account for</text>
    <text class="item" x="20" y="72">" Asset registry</text>
    <text class="item" x="20" y="94">" Fleet management</text>
    <text class="item" x="20" y="116">" Stock control</text>
  </g>

  <!-- Row 2 -->
