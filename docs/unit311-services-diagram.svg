    <rect class="accent" x="0" y="0" width="5" height="44" rx="2"/>
    <text class="title" x="16" y="28">Platform &amp; Portals</text>
    <text class="tag" x="16" y="44">Users, settings &amp; client access</text>
    <text class="item" x="20" y="72">" Internal user management</text>
