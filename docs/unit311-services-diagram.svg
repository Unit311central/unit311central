<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Unit311 services offered">
  <defs>
    <style>
      .bg { fill: #020617; }
      .card { fill: #0b1524; stroke: rgba(255,255,255,0.12); stroke-width: 1; }
      .header { fill: rgba(255,255,255,0.06); }
      .accent { fill: #2563eb; }
      .title { fill: #f8fafc; font: 700 15px Inter, system-ui, sans-serif; }
      .tag { fill: #94a3b8; font: 400 11px Inter, system-ui, sans-serif; }
      .item { fill: #cbd5e1; font: 400 12px Inter, system-ui, sans-serif; }
      .banner-title { fill: #f8fafc; font: 700 28px Inter, system-ui, sans-serif; }
      .banner-sub { fill: #94a3b8; font: 400 14px Inter, system-ui, sans-serif; }
      .hub { fill: #2563eb; }
      .hub-text { fill: #eff6ff; font: 600 13px Inter, system-ui, sans-serif; }
      .flow { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.1); }
      .flow-text { fill: #94a3b8; font: 500 12px Inter, system-ui, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="900"/>

  <rect class="header" x="60" y="40" width="1080" height="90" rx="14"/>
