  <g transform="translate(335,470)">
    <rect class="card" width="255" height="250" rx="12"/>
    <rect class="accent" x="0" y="0" width="5" height="44" rx="2"/>
    <text class="title" x="16" y="28">Strategy &amp; Intelligence</text>
    <text class="tag" x="16" y="44">Plan, compete, collaborate</text>
    <text class="item" x="20" y="72">" Business plan &amp; verticals</text>
    <text class="item" x="20" y="94">" Competitors by sector</text>
    <text class="item" x="20" y="116">" Connections map</text>
    <text class="item" x="20" y="138">" Whiteboard</text>
    <text class="item" x="20" y="160">" Sector intelligence</text>
  </g>
  <g transform="translate(610,470)">
    <rect class="card" width="255" height="250" rx="12"/>
    <rect class="accent" x="0" y="0" width="5" height="44" rx="2"/>
