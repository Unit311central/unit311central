    <text class="tag" x="16" y="44">Start every day with clarity</text>
    <text class="item" x="20" y="72">" Home dashboard</text>
    <text class="item" x="20" y="94">" KPIs &amp; action items</text>
    <text class="item" x="20" y="116">" Weekly schedule</text>
    <text class="item" x="20" y="138">" Mission overview</text>
  </g>
  <g transform="translate(335,210)">
    <rect class="card" width="255" height="230" rx="12"/>
    <rect class="accent" x="0" y="0" width="5" height="44" rx="2"/>
    <text class="title" x="16" y="28">Business Central</text>
    <text class="tag" x="16" y="44">Clients, people &amp; delivery</text>
    <text class="item" x="20" y="72">" Client database &amp; CRM</text>
    <text class="item" x="20" y="94">" Project management</text>
    <text class="item" x="20" y="116">" Representatives &amp; offices</text>
    <text class="item" x="20" y="138">" Human resources</text>
    <text class="item" x="20" y="160">" Recent missions</text>
  </g>
  <g transform="translate(610,210)">
    <rect class="card" width="255" height="230" rx="12"/>
    <rect class="accent" x="0" y="0" width="5" height="44" rx="2"/>
